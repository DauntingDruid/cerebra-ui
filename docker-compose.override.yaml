    image: cerebra-ui:local
    pull_policy: never
    environment:
      - STATIC_DIR=/app/static
      - BETTERAUTH_BASE_URL=http://betterauth-service-betterauth-1:4000
      - BETTERAUTH_URL=http://betterauth-service-betterauth-1:4000
      - CORS_ALLOW_ORIGIN=http://localhost:3000
